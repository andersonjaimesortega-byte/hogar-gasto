<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Invitados | Baby Shower Antonella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            max-width: 1000px;
            width: 95%;
            margin: 40px auto;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 800px;
        }

        th,
        td {
            padding: 18px 20px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: var(--secondary);
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
        }

        tr:hover {
            background-color: #f3e5f5;
            /* Light Lavender */
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-yes {
            background: #e6f7ed;
            color: #1e7e34;
        }

        .status-no {
            background: #feebeb;
            color: #dc3545;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--primary);
        }

        .stat-card h4 {
            font-size: 2.5rem;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .stat-card p {
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="background-overlay"></div>

    <main class="dashboard-container">
        <header class="hero">
            <h1>Lista de Invitados</h1>
            <p class="subtitle">Control de asistencia para el Baby Shower de Antonella</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h4 id="total-guests">0</h4>
                <p>Adultos Confirmados</p>
            </div>
            <div class="stat-card">
                <h4 id="total-responses">0</h4>
                <p>Respuestas Totales</p>
            </div>
            <div class="stat-card">
                <h4 id="attending-count">0</h4>
                <p>Confirmados (Sí)</p>
            </div>
        </div>

        <div class="table-container fade-in-up">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Asistencia</th>
                        <th>Acompañantes</th>
                        <th>Mensaje</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="guests-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>

        <footer class="footer">
            <a href="index.html" style="color: var(--secondary); text-decoration: none; font-weight: 600;">← Volver al
                Formulario</a>
        </footer>
    </main>

    <script src="dashboard.js"></script>
</body>

</html>
