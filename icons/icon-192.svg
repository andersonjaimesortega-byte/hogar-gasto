<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base background (for maskable icon support, fills the safe zone) -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="110" />
  
  <!-- Neon ring -->
  <rect x="40" y="40" width="432" height="432" rx="90" fill="none" stroke="url(#neon-grad)" stroke-width="8" filter="url(#glow)" opacity="0.6" />
  
  <!-- Wallet Drawing -->
  <!-- Cash sticking out -->
  <path d="M190 190 V145 A15 15 0 0 1 205 130 H307 A15 15 0 0 1 322 145 V190" fill="none" stroke="url(#neon-grad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" opacity="0.7" />
  
  <!-- Wallet Body -->
  <rect x="146" y="190" width="220" height="170" rx="20" fill="none" stroke="url(#neon-grad)" stroke-width="16" filter="url(#glow)" />
  
  <!-- Wallet Flap -->
  <path d="M300 235 H356 A10 10 0 0 1 366 245 V295 A10 10 0 0 1 356 305 H300 A20 20 0 0 1 280 285 V255 A20 20 0 0 1 300 235 Z" fill="#111827" stroke="url(#neon-grad)" stroke-width="12" filter="url(#glow)" />
  
  <!-- Button/Clasp -->
  <circle cx="310" cy="270" r="10" fill="url(#neon-grad)" filter="url(#glow)" />
</svg>
